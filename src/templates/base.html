<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LightGroove</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toast-container" id="toast-container"></div>
  <header>
    <span class="brand">LIGHTGROOVE</span>
    <div class="connection-status">
      <div class="connection-dot" id="connection-dot"></div>
      <span id="connection-text">Connected</span>
    </div>
  </header>
  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="console">Console</button>
      <button class="tab" data-tab="colors">Colors</button>
      <button class="tab" data-tab="move">Move</button>
      <button class="tab" data-tab="fixtures">Fixtures</button>
      <button class="tab" data-tab="patch">Patch</button>
      <button class="tab" data-tab="config">Config</button>
    </div>

    <div id="tab-console" class="tab-content active">
      <div class="toolbar-right">
        <button class="secondary midi-learn-btn">MIDI</button>
      </div>
      {TAB_GLOBALS}
      {TAB_SCENES}
      <div class="section-label">Fixtures</div>
      {TAB_FADERS}
    </div>
    {TAB_COLORS}
    {TAB_MOVE}
    {TAB_FIXTURES}
    {TAB_PATCH}
    {TAB_CONFIG}
  </div>

  <script src="script.js"></script>
</body>
</html>
  <script>
  {CONFIG_LOGIC}
  </script>
  <script>
  {PATCH_LOGIC}
  </script>
  <script>
  {FIXTURE_EDITOR_LOGIC}
  </script>
