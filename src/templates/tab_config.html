<div id="tab-config" class="tab-content">
  <div class="grid">
    <!-- ArtNet Nodes Section -->
    <div class="card card--grow-tall">
      <div class="tab-header">
        <h3 style="margin: 0;">ArtNet Nodes</h3>
        <div style="display: flex; gap: 8px;">
          <button id="scan-network-btn">Scan Network</button>
          <button id="add-node-btn">+ Add Manually</button>
        </div>
      </div>
      <div id="discovery-status" class="status-msg"></div>
      <div id="discovered-nodes-list"></div>
      <div id="nodes-list"></div>
    </div>

    <!-- Universe Mapping Section -->
    <div class="card card--grow-tall">
      <div class="tab-header">
        <h3 style="margin: 0;">Universe Mapping</h3>
        <button id="add-mapping-btn">+ Add Mapping</button>
      </div>
      <div id="mappings-list"></div>
    </div>

    <!-- Global Settings Section -->
    <div class="card card--grow-tall">
      <h3>Global Settings</h3>
      <div class="settings-grid">
        <div>
          <label class="form-label">Default Output Mode</label>
          <select id="default-output-mode" class="form-input">
            <option value="virtual">Virtual</option>
            <option value="artnet">ArtNet</option>
          </select>
        </div>
        <div>
          <label class="form-label">FPS</label>
          <input type="number" id="fps" class="form-input" min="1" max="100">
        </div>
        <div>
          <button id="save-global-settings-btn" style="margin-top: 24px;">Save Settings</button>

        </div>
      </div>
      <div class="section-footer">
        <div class="hint-text">Restart to apply config changes that require a full reinitialisation.</div>
        <button id="restart-btn" class="btn--danger">Restart LightGroove</button>
      </div>
    </div>

    <!-- MIDI Devices Section -->
    <div class="card card--grow">
      <div class="tab-header">
        <h3 style="margin: 0;">MIDI Devices</h3>
        <button id="scan-midi-btn">Scan for Devices</button>
      </div>
      <div class="subsection-label">Paired Devices</div>
      <div id="midi-paired-list">
        <div class="summary-text">No paired devices.</div>
      </div>
      <div class="divider"></div>
      <div id="midi-status" class="status-msg"></div>
      <div id="midi-devices-list"></div>
    </div>

    <!-- Colors Section -->
    <div class="card card--grow-tall">
      <div class="tab-header">
        <h3 style="margin: 0;">Colors</h3>
        <button id="add-color-btn">+ Add Color</button>
      </div>
      <div id="colors-list"></div>
    </div>
  </div>
</div>

<!-- Modal for Node Edit/Create -->
<div id="node-modal" class="modal-backdrop">
  <div class="modal-content">
    <h3 id="node-modal-title" class="modal-title">Add Node</h3>
    <input type="hidden" id="node-modal-id">
    <div class="form-stack">
      <div>
        <label class="form-label">Node ID</label>
        <input type="text" id="node-id" class="form-input" placeholder="e.g., node1">
      </div>
      <div>
        <label class="form-label">Protocol</label>
        <select id="node-protocol" class="form-input">
          <option value="artnet">ArtNet</option>
          <option value="sacn">sACN (E1.31)</option>
        </select>
      </div>
      <div>
        <label class="form-label">Name</label>
        <input type="text" id="node-name" class="form-input" placeholder="e.g., Main ArtNet Node">
      </div>
      <div>
        <label class="form-label">IP Address</label>
        <input type="text" id="node-ip" class="form-input" placeholder="e.g., 10.10.10.3">
      </div>
      <div>
        <label class="form-label">Universes (comma-separated)</label>
        <input type="text" id="node-universes" class="form-input" placeholder="e.g., 0, 1">
      </div>
      <div>
        <label class="form-label">Description</label>
        <textarea id="node-description" class="form-textarea" rows="2"></textarea>
      </div>
      <div class="check-row">
        <input type="checkbox" id="node-broadcast" class="form-checkbox">
        <label for="node-broadcast" id="node-broadcast-label">Broadcast Mode</label>
      </div>
      <div class="check-row">
        <input type="checkbox" id="node-enabled" class="form-checkbox" checked>
        <label for="node-enabled">Enabled</label>
      </div>
      <div class="form-actions">
        <button id="node-modal-save">Save</button>
        <button class="secondary" id="node-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal for Mapping Edit/Create -->
<div id="mapping-modal" class="modal-backdrop">
  <div class="modal-content">
    <h3 id="mapping-modal-title" class="modal-title">Add Universe Mapping</h3>
    <input type="hidden" id="mapping-modal-universe">
    <div class="form-stack">
      <div>
        <label class="form-label">DMX Universe</label>
        <input type="number" id="mapping-universe" class="form-input" min="1" placeholder="e.g., 1">
      </div>
      <div>
        <label class="form-label">Node</label>
        <select id="mapping-node" class="form-input">
          <option value="">Select a node...</option>
        </select>
      </div>
      <div>
        <label class="form-label" id="mapping-universe-label">ArtNet Universe</label>
        <input type="number" id="mapping-artnet-universe" class="form-input" min="0" placeholder="e.g., 0">
      </div>
      <div>
        <label class="form-label">Output Mode</label>
        <select id="mapping-output-mode" class="form-input">
          <option value="artnet">ArtNet</option>
          <option value="sacn">sACN (E1.31)</option>
          <option value="virtual">Virtual</option>
        </select>
      </div>
      <div class="form-actions">
        <button id="mapping-modal-save">Save</button>
        <button class="secondary" id="mapping-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal for Color Edit/Create -->
<div id="color-modal" class="modal-backdrop">
  <div class="modal-content">
    <h3 id="color-modal-title" class="modal-title">Add Color</h3>
    <input type="hidden" id="color-modal-id">
    <div class="form-stack">
      <div>
        <label class="form-label">Color Name</label>
        <input type="text" id="color-name" class="form-input" placeholder="e.g., warm-white">
      </div>
      <div class="form-grid-2">
        <div>
          <label class="form-label">Red (0-1)</label>
          <input type="number" id="color-r" class="form-input" min="0" max="1" step="0.01" placeholder="0.0">
        </div>
        <div>
          <label class="form-label">Green (0-1)</label>
          <input type="number" id="color-g" class="form-input" min="0" max="1" step="0.01" placeholder="0.0">
        </div>
        <div>
          <label class="form-label">Blue (0-1)</label>
          <input type="number" id="color-b" class="form-input" min="0" max="1" step="0.01" placeholder="0.0">
        </div>
        <div>
          <label class="form-label">White (0-1)</label>
          <input type="number" id="color-w" class="form-input" min="0" max="1" step="0.01" placeholder="0.0">
        </div>
      </div>
      <div id="color-preview"></div>
      <div class="form-actions">
        <button id="color-modal-save">Save</button>
        <button class="secondary" id="color-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>
