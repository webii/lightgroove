<div id="tab-colors" class="tab-content">
  <div class="grid">
    <div class="card card--flex">
      <h3>Static Colors</h3>
      <div class="color-grid" id="static-colors">
        <!-- Colors will be loaded from server -->
      </div>
    </div>

    <div class="card card--flex-2">
      <h3>Color Cycle</h3>
      <div class="hint-text">Drag colors from Static Colors. FX effects use these colors only when the cycle is non-empty.</div>
      <div id="color-cycle-drop">
        <span id="color-cycle-empty" class="drop-zone-hint">Drop colors here</span>
      </div>
    </div>

    <div class="card">
      <h3>Color FX</h3>
      <div class="col-stack">
        <button class="color-btn fx-btn--random-1" id="fx-random-1">Random 1</button>
        <button class="color-btn fx-btn--random-2" id="fx-random-2">Random 2</button>
        <button class="color-btn fx-btn--random-3" id="fx-random-3">Random 3</button>
        <button class="color-btn fx-btn--random-4" id="fx-random-4">Random 4</button>
        <button class="color-btn secondary" id="fx-stop">Stop FX</button>
      </div>
    </div>
  </div>
</div>
