<div id="tab-fixtures" class="tab-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
    <span id="fixture-lib-summary" style="font-size:13px;color:#9ca3af;"></span>
    <button id="add-fixture-type-btn">+ Add Fixture Type</button>
  </div>
  <div id="fixture-types-list"></div>
</div>

<!-- Fixture Type Add/Edit Modal -->
<div id="fixture-type-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 0;">
  <div style="background:#1f2937;padding:30px;border-radius:8px;max-width:680px;width:90%;margin:auto;">
    <h3 id="fixture-type-modal-title" style="margin-top:0;">Add Fixture Type</h3>
    <input type="hidden" id="ftm-original-key">

    <div style="display:flex;flex-direction:column;gap:18px;">

      <!-- Identity -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
        <div>
          <label style="display:block;margin-bottom:5px;font-weight:500;">Type Key <span style="color:#ef4444;">*</span></label>
          <input type="text" id="ftm-key" placeholder="e.g., rgbw_par" style="width:100%;padding:8px;border-radius:4px;border:1px solid #374151;background:#111827;color:white;font-family:monospace;">
          <div style="font-size:11px;color:#6b7280;margin-top:3px;">Lowercase, underscores only. Used in patch.json.</div>
          <div id="ftm-key-error" style="color:#ef4444;font-size:12px;margin-top:4px;display:none;"></div>
        </div>
        <div>
          <label style="display:block;margin-bottom:5px;font-weight:500;">Manufacturer</label>
          <input type="text" id="ftm-manufacturer" placeholder="e.g., Generic" style="width:100%;padding:8px;border-radius:4px;border:1px solid #374151;background:#111827;color:white;">
        </div>
      </div>

      <div>
        <label style="display:block;margin-bottom:5px;font-weight:500;">Display Name <span style="color:#ef4444;">*</span></label>
        <input type="text" id="ftm-name" placeholder="e.g., RGBW PAR Can" style="width:100%;padding:8px;border-radius:4px;border:1px solid #374151;background:#111827;color:white;">
        <div id="ftm-name-error" style="color:#ef4444;font-size:12px;margin-top:4px;display:none;"></div>
      </div>

      <!-- Channels -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <label style="font-weight:500;">Channels</label>
          <button id="ftm-add-channel-btn" style="padding:4px 12px;font-size:12px;">+ Add Channel</button>
        </div>
        <div id="ftm-channels-list" style="display:flex;flex-direction:column;gap:6px;"></div>
        <div id="ftm-channels-empty" style="font-size:13px;color:#6b7280;padding:8px 0;display:none;">No channels yet — click "+ Add Channel".</div>
      </div>

      <!-- Options -->
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="ftm-dimmer-on-black" style="width:16px;height:16px;">
        <label for="ftm-dimmer-on-black" style="font-size:14px;">Dimmer on black</label>
        <span style="font-size:11px;color:#6b7280;">(keeps dimmer at 0 when color is black — for colour-wheel moving heads)</span>
      </div>

      <!-- Color Wheel Mapping (collapsible) -->
      <div>
        <button id="ftm-cw-toggle" class="secondary" style="padding:5px 12px;font-size:12px;width:100%;text-align:left;">
          ▶ Color Wheel Mapping <span style="font-size:11px;color:#6b7280;margin-left:8px;">optional — for fixtures with a physical colour wheel</span>
        </button>
        <div id="ftm-cw-section" style="display:none;margin-top:10px;padding:14px;border:1px solid #374151;border-radius:6px;background:#111827;">
          <div style="font-size:12px;color:#9ca3af;margin-bottom:10px;">
            Maps colour names (used by the effects engine) to DMX values on the wheel.
          </div>
          <div id="ftm-cw-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;"></div>
          <button id="ftm-add-cw-btn" style="padding:4px 12px;font-size:12px;">+ Add Colour</button>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:5px;">
        <button id="ftm-save-btn">Save Fixture Type</button>
        <button class="secondary" id="ftm-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>
</div>
