<div id="tab-move" class="tab-content">
  <div class="grid">
    <div class="card">
      <h3>Move Position</h3>
      <div class="col-stack--lg">
        <div class="xy-pad" id="xy-pad">
          <div class="xy-cursor" id="xy-cursor"></div>
          <div class="xy-arrow xy-arrow--top">▲</div>
          <div class="xy-arrow xy-arrow--bottom">▼</div>
          <div class="xy-arrow xy-arrow--left">◄</div>
          <div class="xy-arrow xy-arrow--right">►</div>
        </div>
        <div class="xy-readout">
          <span>Pan: <span id="xy-pan-value">0.50</span></span>
          <span>Tilt: <span id="xy-tilt-value">0.50</span></span>
        </div>
        <button class="color-btn secondary" id="xy-center">Reset to Center</button>
      </div>
    </div>
    <div class="card">
      <h3>Move FX</h3>
      <div class="col-stack">
        <button class="color-btn fx-btn--pan-sway"  id="fx-pan-sway">↔ Pan Sway</button>
        <button class="color-btn fx-btn--tilt-sway" id="fx-tilt-sway">↕ Tilt Sway</button>
        <button class="color-btn fx-btn--circle"    id="fx-circle">⭕ Circle</button>
        <button class="color-btn fx-btn--eight"     id="fx-eight">∞ Figure-8</button>
        <button class="color-btn fx-btn--lissajous" id="fx-lissajous">〰 Lissajous</button>
        <button class="color-btn fx-btn--diamond"   id="fx-diamond">◆ Diamond</button>
        <button class="color-btn secondary" id="fx-move-off">Stop Move FX</button>
      </div>
    </div>
    <div class="card">
      <h3>Move FX Size</h3>
      <div class="slider-vert-wrap">
        <input type="range" id="fx-size-slider" class="slider-vert" min="0" max="100" value="30" step="1" orient="vertical" />
        <div class="slider-readout"><span id="fx-size-value">30</span>%</div>
      </div>
    </div>
    <div class="card">
      <h3>Move Phase</h3>
      <div class="slider-vert-wrap">
        <input type="range" id="move-phase-slider" class="slider-vert" min="0" max="100" value="0" step="1" orient="vertical" />
        <div class="slider-readout"><span id="move-phase-value">0</span>%</div>
      </div>
    </div>
    <div class="card">
      <h3>Move Speed</h3>
      <div class="slider-vert-wrap">
        <input type="range" id="move-speed-slider" class="slider-vert" min="0" max="100" value="50" step="1" orient="vertical" />
        <div class="slider-readout"><span id="move-speed-value">50</span>%</div>
      </div>
    </div>
  </div>
</div>
