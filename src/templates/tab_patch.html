<div id="tab-patch" class="tab-content">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
    <span id="patch-summary" style="font-size: 13px; color: #9ca3af;"></span>
    <button id="add-fixture-btn">+ Add Fixture</button>
  </div>
  <div id="patch-universes"></div>
</div>

<!-- Fixture Add/Edit Modal -->
<div id="fixture-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px 0;">
  <div style="background: #1f2937; padding: 30px; border-radius: 8px; max-width: 580px; width: 90%; margin: auto;">
    <h3 id="fixture-modal-title" style="margin-top: 0;">Add Fixture</h3>
    <input type="hidden" id="fixture-modal-original-id">
    <div style="display: flex; flex-direction: column; gap: 15px;">

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 500;">Fixture ID <span style="color: #ef4444;">*</span></label>
          <input type="text" id="fixture-id" placeholder="e.g., par1" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #374151; background: #111827; color: white;">
          <div id="fixture-id-error" style="color: #ef4444; font-size: 12px; margin-top: 4px; display: none;"></div>
        </div>
        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 500;">Universe <span style="color: #ef4444;">*</span></label>
          <input type="number" id="fixture-universe" min="1" placeholder="1" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #374151; background: #111827; color: white;">
        </div>
      </div>

      <div>
        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Fixture Type <span style="color: #ef4444;">*</span></label>
        <select id="fixture-type" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #374151; background: #111827; color: white;">
          <option value="">Select fixture type...</option>
        </select>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 500;">Start Address <span style="color: #ef4444;">*</span></label>
          <input type="number" id="fixture-start-address" min="1" max="512" placeholder="1" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #374151; background: #111827; color: white;">
          <div id="fixture-addr-error" style="color: #ef4444; font-size: 12px; margin-top: 4px; display: none;"></div>
        </div>
        <div>
          <label style="display: block; margin-bottom: 5px; font-weight: 500;">End Address</label>
          <div id="fixture-end-address" style="padding: 9px 8px; border-radius: 4px; border: 1px solid #374151; background: #0f172a; color: #9ca3af; font-size: 14px;">—</div>
        </div>
      </div>

      <div>
        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Description</label>
        <input type="text" id="fixture-description" placeholder="e.g., Stage Left PAR" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #374151; background: #111827; color: white;">
      </div>

      <div id="channel-preview" style="display: none;">
        <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em;">Channel Layout</label>
        <div id="channel-preview-list" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 5px;">
        <button id="fixture-modal-save">Save Fixture</button>
        <button class="secondary" id="fixture-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>
